services:
  dagster:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file: .env
    stop_signal: SIGINT
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: datarift
      POSTGRES_PASSWORD: datarift
      POSTGRES_DB: datarift
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
